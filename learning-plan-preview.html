<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>初一低压力学习计划预览</title>
  <style>
    :root {
      --bg: #eef5f8;
      --panel: #ffffff;
      --panel-soft: #eef8f5;
      --ink: #1d2635;
      --muted: #617084;
      --line: #d2dde8;
      --math: #2c806d;
      --english: #496fb1;
      --chinese: #b06a52;
      --accent: #6d76b8;
      --gold: #b98735;
      --ok: #def4e9;
      --warn: #fff3da;
      --shadow: 0 16px 42px rgba(37, 48, 79, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(145deg, rgba(238, 245, 248, 0.96), rgba(246, 241, 251, 0.92) 52%, rgba(239, 248, 245, 0.96)),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 18px;
      background: linear-gradient(180deg, #1d2e4d 0%, #26345f 48%, #273c45 100%);
      color: #f8fafc;
      overflow: auto;
    }

    .brand {
      margin-bottom: 22px;
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: #d6e5ef;
      font-size: 13px;
    }

    .side-section {
      margin-top: 22px;
    }

    .side-title {
      margin: 0 0 10px;
      color: #dbe4ee;
      font-size: 13px;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      gap: 8px;
    }

    .tab-btn {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(224, 236, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #f8fafc;
      text-align: left;
      padding: 9px 11px;
      cursor: pointer;
    }

    .tab-btn[aria-selected="true"] {
      background: #f6fbff;
      color: #1f2d4a;
      border-color: #f6fbff;
    }

    .stats {
      display: grid;
      gap: 8px;
    }

    .stat {
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
    }

    .stat strong {
      display: block;
      font-size: 20px;
    }

    .stat span {
      color: #cbd5e1;
      font-size: 12px;
    }

    main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
      color: #253253;
    }

    .topbar p {
      margin: 0;
      max-width: 880px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 5px;
      background: #e9eef3;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    .segmented button {
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      padding: 6px 12px;
      background: transparent;
      color: #334155;
      cursor: pointer;
    }

    .segmented button[aria-pressed="true"] {
      background: #ffffff;
      color: #111827;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
    }

    .search {
      min-height: 42px;
      width: min(100%, 320px);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section {
      padding: 18px;
    }

    .section + .section {
      border-top: 1px solid var(--line);
    }

    .section h3 {
      margin: 0 0 12px;
      font-size: 19px;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.single {
      grid-template-columns: 1fr;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(36, 48, 78, 0.04);
    }

    .card.soft {
      background:
        linear-gradient(135deg, rgba(238, 248, 245, 0.98), rgba(248, 246, 255, 0.96));
      border-color: #cbdce5;
    }

    .card h4 {
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
    }

    .tag.math {
      border-color: rgba(34, 111, 84, 0.26);
      background: rgba(34, 111, 84, 0.08);
      color: var(--math);
    }

    .tag.english {
      border-color: rgba(49, 95, 155, 0.26);
      background: rgba(49, 95, 155, 0.08);
      color: var(--english);
    }

    .tag.chinese {
      border-color: rgba(155, 77, 58, 0.26);
      background: rgba(155, 77, 58, 0.08);
      color: var(--chinese);
    }

    .day-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 16px;
      align-items: stretch;
    }

    .day-head.single {
      grid-template-columns: 1fr;
    }

    .day-title {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .meta-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .meta-list li {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 8px;
      font-size: 14px;
    }

    .meta-list b {
      color: #334155;
    }

    .mood {
      background: var(--warn);
    }

    .video {
      background: linear-gradient(135deg, #e8f7f2, #f8fbff);
      border-color: #b8d9cf;
    }

    .welcome {
      background: linear-gradient(135deg, #f7f4fb, #fff9ed);
      border-color: #ddd2ed;
    }

    .video-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .primary-link,
    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 0;
      border-radius: 7px;
      background: linear-gradient(135deg, #2c806d, #536fb5);
      color: #ffffff;
      padding: 8px 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .primary-link:hover,
    .primary-link:focus-visible,
    .primary-btn:hover,
    .primary-btn:focus-visible {
      background: linear-gradient(135deg, #236957, #445d9e);
      outline: 0;
    }

    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .word {
      min-height: 180px;
    }

    .word-title {
      display: flex;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .word-title strong {
      font-size: 18px;
    }

    .word-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .qa-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .question {
      min-height: 250px;
      display: grid;
      grid-template-rows: auto auto auto auto 1fr;
      gap: 10px;
    }

    .question.math-card {
      border-left: 4px solid var(--math);
      background: linear-gradient(180deg, #ffffff, #f7fbf9);
    }

    .question.english-card {
      border-left: 4px solid var(--english);
    }

    .question .q {
      margin: 0;
      color: var(--ink);
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .options li {
      min-height: 36px;
    }

    .option-btn {
      width: 100%;
      min-height: 36px;
      padding: 7px 9px;
      border-radius: 6px;
      background: #f8fafc;
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .option-btn:hover,
    .option-btn:focus-visible {
      border-color: #7a9bbd;
      background: #eef5fb;
      outline: 0;
    }

    .option-btn.selected {
      border-color: var(--accent);
      background: #f2eaf8;
    }

    .option-btn.correct {
      background: var(--ok);
      border-color: #9bd8b4;
      color: #165534;
      font-weight: 700;
    }

    .option-btn.wrong {
      background: #ffe8e6;
      border-color: #f0a7a0;
      color: #8d281f;
      font-weight: 700;
    }

    .question.answered .option-btn {
      cursor: default;
    }

    .quiz-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .mini-btn {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: #334155;
      padding: 5px 10px;
      cursor: pointer;
    }

    .mini-btn:hover,
    .mini-btn:focus-visible {
      border-color: #7a9bbd;
      background: #f8fafc;
      outline: 0;
    }

    .quiz-status {
      color: var(--muted);
      font-size: 13px;
    }

    .hint-box,
    .feedback {
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
      font-size: 14px;
    }

    .hint-box p,
    .feedback p {
      margin: 5px 0;
    }

    .feedback-title {
      color: #334155;
    }

    .english-mission-section {
      background: linear-gradient(180deg, #1f2947, #192334);
      color: #eef7ff;
    }

    .english-mission-head {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px dashed rgba(126, 214, 223, 0.35);
      margin-bottom: 18px;
    }

    .mission-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, #d75b4c, #e8a64b);
      color: #ffffff;
      font-weight: 800;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.22);
    }

    .english-mission-head h3 {
      margin: 0;
      color: #9fe3e2;
      font-size: 24px;
    }

    .english-mission-note {
      margin: 0 0 14px;
      color: #c8d5e8;
      font-size: 14px;
    }

    .english-mission-list {
      display: grid;
      gap: 14px;
    }

    .english-task {
      min-height: 0;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #171d2f, #141b2b);
      box-shadow: none;
      padding: 16px;
      color: #f6f7fb;
    }

    .english-task .question-line {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      margin: 0;
      color: #f6f7fb;
      font-size: 18px;
      font-weight: 800;
    }

    .english-task .question-index {
      color: #f2efe7;
    }

    .english-task .method-tag {
      color: #f7f4ec;
    }

    .english-task .options {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .english-task .option-btn {
      min-height: 48px;
      border-color: #314766;
      background: #1e2a3d;
      color: #c7d1df;
      font-size: 16px;
      font-weight: 700;
    }

    .english-task .option-btn:hover,
    .english-task .option-btn:focus-visible {
      border-color: #6aa6c8;
      background: #26364e;
    }

    .english-task .option-btn.selected {
      border-color: #b58ad8;
      background: #302649;
    }

    .english-task .option-btn.correct {
      border-color: #7fd3a0;
      background: #193d2d;
      color: #dff7e8;
    }

    .english-task .option-btn.wrong {
      border-color: #ec8b83;
      background: #4a2328;
      color: #ffe6e3;
    }

    .english-task .mini-btn {
      border-color: #314766;
      background: #1e2a3d;
      color: #d9e5f3;
    }

    .english-task .mini-btn:hover,
    .english-task .mini-btn:focus-visible {
      border-color: #6aa6c8;
      background: #26364e;
    }

    .english-task .quiz-status {
      color: #9fb0c7;
    }

    .english-task .hint-box,
    .english-task .feedback {
      border-color: #314766;
      background: #111827;
      color: #c8d5e8;
    }

    .english-task .feedback-title,
    .english-task .answer {
      color: #8ee3a7;
    }

    .answer-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
    }

    .answer {
      color: #165534;
      font-weight: 800;
    }

    .fill-card {
      display: grid;
      gap: 12px;
    }

    .fill-prompt {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, #fffdf8, #f6fbff);
      color: #243244;
      font-weight: 700;
    }

    .blank-input {
      min-width: min(100%, 190px);
      flex: 1 1 190px;
      min-height: 40px;
      border: 1px solid #d5b98f;
      border-radius: 7px;
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
    }

    .blank-input:focus {
      border-color: var(--chinese);
      outline: 2px solid rgba(155, 77, 58, 0.16);
    }

    .submit-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
    }

    .completion-status {
      color: var(--muted);
      font-size: 14px;
    }

    .reflection-panel {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #c7d8cd;
      border-radius: 8px;
      background: #f2fbf5;
    }

    .focus-card {
      background: linear-gradient(135deg, #f4fbff, #fff8ec);
      border-color: #c9dce7;
    }

    .schulte-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 16px;
      align-items: start;
    }

    .schulte-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(44px, 1fr));
      gap: 8px;
      max-width: 430px;
    }

    .schulte-cell {
      aspect-ratio: 1;
      border: 1px solid #c3d4e0;
      border-radius: 8px;
      background: linear-gradient(145deg, #ffffff, #eef8fb);
      color: #263653;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(48, 64, 98, 0.06);
    }

    .schulte-cell:hover,
    .schulte-cell:focus-visible {
      border-color: #7ab8c7;
      background: #f6fdff;
      outline: 0;
    }

    .schulte-cell.found {
      border-color: #9bd7b1;
      background: #dff4e8;
      color: #1f6040;
      cursor: default;
    }

    .schulte-cell.error {
      border-color: #e4a08f;
      background: #fff0ec;
      color: #943b2b;
    }

    .schulte-side {
      display: grid;
      gap: 10px;
    }

    .schulte-status {
      min-height: 26px;
      color: #43546b;
      font-weight: 700;
    }

    .schulte-meter {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #dde7ef;
    }

    .schulte-meter span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #6db6b2, #e6b45e);
      transition: width 0.18s ease;
    }

    .reflection-panel h4 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .reflection-panel p {
      margin: 7px 0 0;
      color: #365144;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .catalog-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .catalog-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 10px;
    }

    .detail-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .detail-row {
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }

    .detail-row b {
      display: block;
      margin-bottom: 5px;
      color: #243244;
      font-size: 13px;
    }

    .detail-row span {
      color: var(--muted);
      font-size: 13px;
    }

    .text-list {
      display: grid;
      gap: 6px;
      margin: 8px 0 0;
      padding: 0;
      list-style: none;
    }

    .text-list li {
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8fafc;
      font-size: 13px;
    }

    .notice {
      border-left: 4px solid var(--accent);
      background: #f7f0fb;
    }

    .roadmap-list {
      display: grid;
      gap: 10px;
    }

    .roadmap-day {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 12px;
    }

    .roadmap-index {
      display: grid;
      gap: 3px;
      justify-items: start;
    }

    .roadmap-index strong {
      font-size: 18px;
      color: var(--accent);
    }

    .roadmap-index span {
      color: var(--muted);
      font-size: 12px;
    }

    .roadmap-subjects {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .roadmap-subject {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      padding: 9px;
    }

    .roadmap-subject b {
      display: block;
      margin-bottom: 4px;
      color: #243244;
      font-size: 13px;
    }

    .roadmap-subject span {
      color: var(--muted);
      font-size: 13px;
    }

    .wrongbook-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .wrongbook-list {
      display: grid;
      gap: 12px;
    }

    .wrong-card {
      border-left: 4px solid #b94d42;
    }

    .wrong-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }

    .share-steps {
      display: grid;
      gap: 10px;
    }

    .share-steps code {
      display: inline-block;
      max-width: 100%;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1080px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
      }

      .tabs {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .grid,
      .grid.two,
      .catalog-list,
      .qa-grid,
      .vocab-grid,
      .english-task .options,
      .roadmap-subjects,
      .roadmap-day,
      .day-head,
      .schulte-wrap {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      main {
        padding: 16px;
      }

      .sidebar {
        padding: 16px;
      }

      .tabs {
        grid-template-columns: 1fr 1fr;
      }

  <script>
    const DATA = JSON.parse(document.getElementById("plan-data").textContent);
    const BILIBILI_MATH_VIDEO_URL = "https://www.bilibili.com/video/BV1qb411A7Zz/?spm_id_from=333.1387.homepage.video_card.click";
    const state = {
      view: "catalog",
      subject: "all",
      search: ""
    };

    const WRONG_BOOK_KEY = "grade7LearningWrongBook.v1";
    const DAILY_SUBMIT_KEY = "grade7LearningDailySubmit.v1";
    let wrongBook = loadWrongBook();
    let dailySubmissions = loadDailySubmissions();
    let schulteTimer = null;

    const titleEl = document.getElementById("pageTitle");
    const introEl = document.getElementById("pageIntro");
    const contentEl = document.getElementById("content");
    const tabsEl = document.getElementById("viewTabs");
    const statsEl = document.getElementById("stats");
    const searchEl = document.getElementById("searchInput");
    const subjectFilterEl = document.getElementById("subjectFilter");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function answerLetter(index) {
      return ["A", "B", "C"][index] || "";
    }

    function includesSearch(value) {
      const needle = state.search.trim().toLowerCase();
      if (!needle) return true;
      return JSON.stringify(value).toLowerCase().includes(needle);
    }

    function visibleBySubject(subject) {
      return state.subject === "all" || state.subject === subject;
    }

    function pill(text, subject = "") {
      return `<span class="tag ${subject}">${escapeHtml(text)}</span>`;
    }

    function loadWrongBook() {
      try {
        const raw = localStorage.getItem(WRONG_BOOK_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (error) {
        return [];
      }
    }

    function saveWrongBook() {
      localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(wrongBook));
    }

    function loadDailySubmissions() {
      try {
        const raw = localStorage.getItem(DAILY_SUBMIT_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (error) {
        return {};
      }
    }

    function saveDailySubmissions() {
      localStorage.setItem(DAILY_SUBMIT_KEY, JSON.stringify(dailySubmissions));
    }

    function subjectLabel(subject) {
      return { math: "数学", english: "英语", chinese: "语文" }[subject] || subject;
    }

    function findQuestion(dayId, subject, questionId) {
      const day = DATA.days[dayId];
      if (!day || !Array.isArray(day[subject])) return null;
      return day[subject].find(item => item.id === questionId) || null;
    }

    function recordWrong(card, selectedIndex, correctIndex) {
      const dayId = card.dataset.day;
      const subject = card.dataset.subject;
      const questionId = card.dataset.questionId;
      const item = findQuestion(dayId, subject, questionId);
      if (!item) return;

      const key = `${dayId}:${subject}:${questionId}`;
      const now = new Date().toISOString();
      const existing = wrongBook.find(record => record.key === key);
      const nextRecord = {
        key,
        dayId,
        subject,
        subjectLabel: subjectLabel(subject),
        questionId,
        point: item.point,
        q: item.q,
        options: item.options,
        ans: item.ans,
        selectedIndex,
        selectedOption: item.options[selectedIndex],
        correctIndex,
        correctOption: item.options[correctIndex],
        hint: item.hint,
        explain: item.explain,
        encouragement: item.encouragement,
        wrongCount: existing ? existing.wrongCount + 1 : 1,
        firstWrongAt: existing ? existing.firstWrongAt : now,
        lastWrongAt: now
      };

      if (existing) {
        wrongBook = wrongBook.map(record => record.key === key ? nextRecord : record);
      } else {
        wrongBook = [nextRecord, ...wrongBook];
      }

      saveWrongBook();
      renderStats();
    }

    function removeWrong(key) {
      wrongBook = wrongBook.filter(record => record.key !== key);
      saveWrongBook();
      render();
    }

    function clearWrongBook() {
      wrongBook = [];
      saveWrongBook();
      render();
    }

    function renderArrayPills(items, subject) {
      return (items || []).map(item => pill(item, subject)).join("");
    }

    function renderMathCatalogCard(item) {
      return `
        <article class="card" data-subject="math">
          <h4>${escapeHtml(item.volume)} ${escapeHtml(item.chapter)}</h4>
          <p>${escapeHtml(item.unitGoal)}</p>
          <div class="detail-list">
            ${(item.sections || []).map(section => `
              <div class="detail-row">
                <b>${escapeHtml(section.code)} ${escapeHtml(section.title)}</b>
                <span>${escapeHtml((section.points || []).join(" / "))}</span>
              </div>
            `).join("")}
          </div>
        </article>
      `;
    }

    function renderEnglishCatalogCard(item) {
      return `
        <article class="card" data-subject="english">
          <h4>${escapeHtml(item.volume)} ${escapeHtml(item.module)}</h4>
          <div class="catalog-meta">${renderArrayPills(item.themes, "english")}</div>
          <p><b>单词范围：</b>${escapeHtml((item.wordRange || []).join(" / "))}</p>
          <p><b>核心语法：</b>${escapeHtml((item.grammar || []).join(" / "))}</p>
          <p><b>能力目标：</b>${escapeHtml((item.skills || []).join(" / "))}</p>
          <div class="tags">${renderArrayPills(item.memoryMethods, "english")}</div>
        </article>
      `;
    }

    function renderChineseCatalogCard(item) {
      return `
        <article class="card" data-subject="chinese">
          <h4>${escapeHtml(item.volume)} ${escapeHtml(item.unit)}</h4>

          </p>
          <ul class="options">
            ${item.options.map((option, optionIndex) => `<li><button type="button" class="option-btn" data-index="${optionIndex}">${escapeHtml(option)}</button></li>`).join("")}
          </ul>
          <div class="quiz-actions">
            <button type="button" class="mini-btn hint-btn">看提示</button>
            <button type="button" class="mini-btn reveal-btn">揭晓答案</button>
            <button type="button" class="mini-btn reset-btn hidden">重做本题</button>
            <span class="quiz-status" aria-live="polite">先选一个选项</span>
          </div>
          <div class="hint-box hidden">
            <p><b>提示：</b>${escapeHtml(item.hint)}</p>
          </div>
          <div class="feedback hidden">
            <p><b class="feedback-title">反馈</b><span class="answer"> 答案 ${answerLetter(item.ans)}</span></p>
            <p><b>解析：</b>${escapeHtml(item.explain)}</p>
            <p>${escapeHtml(item.encouragement)}</p>
          </div>
        </article>
      `).join("");

      return `
        <section class="section english-mission-section">
          <div class="english-mission-head">
            <span class="mission-icon">A</span>
            <h3>英语委托（10题）</h3>
          </div>
          <p class="english-mission-note">学习法：${escapeHtml(day.dailyCatalog.englishMethod)}。题目按“拆词逻辑、词缀词根、熟词联想、场景记忆、时态感知”设计，不靠硬背硬扛。</p>
          <div class="english-mission-list">${cards || emptyBlock()}</div>
        </section>
      `;
    }

    function renderQuestions(title, questions, subject, dayId) {
      const cards = questions.filter(includesSearch).map(item => `
        <article class="card question ${subject}-card" data-answer="${item.ans}" data-day="${escapeHtml(dayId)}" data-subject="${escapeHtml(subject)}" data-question-id="${escapeHtml(item.id)}">
          <div class="tags">${pill(item.id, subject)}${pill(item.point, subject)}</div>
          <p class="q">${escapeHtml(item.q)}</p>
          <ul class="options">
            ${item.options.map((option, index) => `<li><button type="button" class="option-btn" data-index="${index}">${escapeHtml(option)}</button></li>`).join("")}
          </ul>
          <div class="quiz-actions">
            <button type="button" class="mini-btn hint-btn">看提示</button>
            <button type="button" class="mini-btn reveal-btn">揭晓答案</button>
            <button type="button" class="mini-btn reset-btn hidden">重做本题</button>
            <span class="quiz-status" aria-live="polite">先选一个选项</span>
          </div>
          <div class="hint-box hidden">
            <p><b>提示：</b>${escapeHtml(item.hint)}</p>
          </div>
          <div class="feedback hidden">
            <p><b class="feedback-title">反馈</b><span class="answer"> 答案 ${answerLetter(item.ans)}</span></p>
            <p><b>解析：</b>${escapeHtml(item.explain)}</p>
            <p>${escapeHtml(item.encouragement)}</p>
          </div>
        </article>
      `).join("");
      return `<section class="section"><h3>${escapeHtml(title)}</h3><div class="qa-grid">${cards || emptyBlock()}</div></section>`;
    }

    function renderChineseFillPrompt(dayId, item) {
      const rawFormat = item.answerFormat || "我想到____，因为____。";
      const sentence = rawFormat
        .replace("写或说", "打字")
        .replace(/^[^：:]*[：:]/, "");
      const parts = sentence.split(/_{2,}/);
      const blankCount = Math.max(0, parts.length - 1);
      const placeholders = ["写一个画面", "写一种感觉", "写一个原因", "写一个特点", "再补一句"];

      if (!blankCount) {
        return `
          <div class="fill-prompt">
            <span>${escapeHtml(sentence)}</span>
            <input class="blank-input chinese-blank" type="text" data-day="${escapeHtml(dayId)}" aria-label="语文填空" placeholder="在这里打字">
          </div>
        `;
      }

      return `
        <div class="fill-prompt">
          ${parts.map((part, index) => `
            <span>${escapeHtml(part)}</span>
            ${index < blankCount ? `<input class="blank-input chinese-blank" type="text" data-day="${escapeHtml(dayId)}" aria-label="语文填空 ${index + 1}" placeholder="${escapeHtml(placeholders[index] || "在这里打字")}">` : ""}
          `).join("")}
        </div>
      `;
    }

    function renderChinese(dayId, day) {
      const item = day.chinese;
      return `
        <section class="section">
          <h3>语文打字填空</h3>
          <div class="grid two">
            <article class="card fill-card">
              <h4>${escapeHtml(item.title)}</h4>
              <p><b>时间：</b>${escapeHtml(item.time)}</p>
              <p><b>任务：</b>${escapeHtml(item.mission)}</p>
              ${renderChineseFillPrompt(dayId, item)}
              <p><b>小参考：</b>${escapeHtml(item.sampleAnswer)}</p>
            </article>
            <article class="card">
              <h4>目录对应</h4>
              <p><b>单元：</b>${escapeHtml(item.chineseCatalog.unit)}</p>
              <p><b>课文：</b>${escapeHtml(item.chineseCatalog.text)}</p>
              <p><b>体裁：</b>${escapeHtml(item.chineseCatalog.genre)}</p>
              <p><b>能力：</b>${escapeHtml(item.chineseCatalog.examAbility)}</p>
              <p><b>奖励：</b>${escapeHtml(item.reward)}</p>
            </article>
          </div>
        </section>
      `;
    }

    function shuffleNumbers(count) {
      const numbers = Array.from({ length: count }, (_, index) => index + 1);
      for (let index = numbers.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [numbers[index], numbers[swapIndex]] = [numbers[swapIndex], numbers[index]];
      }
      return numbers;
    }

    function renderSchulteCells(numbers) {
      return numbers.map(number => `
        <button type="button" class="schulte-cell" data-number="${number}" aria-label="数字 ${number}">${number}</button>
      `).join("");
    }

    function renderSchulte(dayId) {
      const numbers = shuffleNumbers(25);
      return `
        <section class="section">
          <article class="card focus-card schulte-section" data-day="${escapeHtml(dayId)}">
            <h3>舒尔特方格：星光专注训练</h3>
            <div class="schulte-wrap">
              <div class="schulte-board" data-next="1" data-total="25">
                ${renderSchulteCells(numbers)}
              </div>
              <div class="schulte-side">
                <p>按 1 到 25 的顺序点亮小格子。点到 1 时自动开始计时，点完 25 后完成。</p>
                <div class="schulte-meter" aria-hidden="true"><span></span></div>
                <div class="schulte-status" aria-live="polite">从 1 开始，慢一点也可以。</div>
                <button type="button" class="mini-btn schulte-reset-btn">随机换一套</button>
              </div>
            </div>
          </article>
        </section>
      `;
    }

    function renderReflectionContent(day, submission = null) {
      const summary = submission?.summary ? `<p><b>完成记录：</b>${escapeHtml(submission.summary)}</p>` : "";
      return `
        <h4>当天复盘</h4>
        ${summary}
        <p>${escapeHtml(day.review)}</p>
        <p><b>完成奖励：</b>${escapeHtml(day.reward)}</p>
        <p><b>明天的小调整：</b>${escapeHtml(day.tracking.nextDayAdjustment)}</p>
      `;
    }

    function renderDailySubmit(dayId, day) {
      if (!includesSearch(day.review) && !includesSearch(day.tracking) && state.search) return "";
      const submission = dailySubmissions[dayId] || null;
      return `
        <section class="section completion-section" data-day-submit="${escapeHtml(dayId)}">
          <article class="card completion-card">
            <h3>今日整体提交</h3>
            <p>数学、英语和语文填空都做到这里后，点一下提交。提交后会出现今天的复盘内容。</p>
            <div class="submit-row">
              <button type="button" class="primary-btn daily-submit-btn" data-day="${escapeHtml(dayId)}">${submission ? "已提交，查看复盘" : "提交今天任务"}</button>
              <span class="completion-status" aria-live="polite">${submission ? "复盘已生成" : "完成后再点也可以"}</span>
            </div>
            <div class="reflection-panel ${submission ? "" : "hidden"}">
              ${submission ? renderReflectionContent(day, submission) : ""}
            </div>
          </article>
        </section>
      `;
    }

    function emptyBlock(text = "没有匹配内容") {
      return `<div class="empty">${escapeHtml(text)}</div>`;
    }

    function render() {
      stopSchulteTimer();
      renderTabs();
      renderStats();
      if (state.view === "catalog") {
        renderCatalog();
      } else if (state.view === "roadmap") {
        renderRoadmap();
      } else if (state.view === "wrongbook") {
        renderWrongBook();
      } else if (DATA.days[state.view]) {
        renderDay(state.view);
      } else {
        state.view = "catalog";
        renderCatalog();
      }
    }

    function showHint(card) {
      card.querySelector(".hint-box")?.classList.remove("hidden");
      const status = card.querySelector(".quiz-status");
      if (status) status.textContent = "可以先看提示，再慢慢选";
    }

    function revealQuestion(card, selectedIndex = null) {
      if (card.classList.contains("answered")) return;
      const correctIndex = Number(card.dataset.answer);
      const buttons = [...card.querySelectorAll(".option-btn")];
      buttons.forEach((button, index) => {
        button.disabled = true;
        if (index === correctIndex) button.classList.add("correct");
        if (index === selectedIndex) button.classList.add("selected");
        if (selectedIndex !== null && index === selectedIndex && index !== correctIndex) {
          button.classList.add("wrong");
        }
      });

      card.classList.add("answered");
      card.querySelector(".feedback")?.classList.remove("hidden");

      const title = card.querySelector(".feedback-title");
      const status = card.querySelector(".quiz-status");
      card.querySelector(".reset-btn")?.classList.remove("hidden");
      if (selectedIndex === null) {
        if (title) title.textContent = "先看答案也可以";
        if (status) status.textContent = "答案已揭晓";
      } else if (selectedIndex === correctIndex) {
        if (title) title.textContent = "答对了";
        if (status) status.textContent = "答对了，继续下一题";
      } else {
        if (title) title.textContent = "这题先记成一次探索";
        if (status) status.textContent = "看一下解析，再继续就好";
        recordWrong(card, selectedIndex, correctIndex);
      }
    }

    function resetQuestion(card) {
      card.classList.remove("answered");
      card.querySelectorAll(".option-btn").forEach(button => {
        button.disabled = false;
        button.classList.remove("selected", "correct", "wrong");
      });
      card.querySelector(".feedback")?.classList.add("hidden");
      card.querySelector(".hint-box")?.classList.add("hidden");
      card.querySelector(".reset-btn")?.classList.add("hidden");
      const status = card.querySelector(".quiz-status");
      if (status) status.textContent = "先选一个选项";
    }

    function stopSchulteTimer() {
      if (schulteTimer) {
        clearInterval(schulteTimer);
        schulteTimer = null;
      }
    }

    function formatSeconds(ms) {
      return (ms / 1000).toFixed(1);
    }

    function updateSchulteElapsed(section) {
      const startedAt = Number(section.dataset.startedAt || 0);
      if (!startedAt) return;
      const status = section.querySelector(".schulte-status");
      const next = Number(section.querySelector(".schulte-board")?.dataset.next || 1);
      if (status && !section.classList.contains("schulte-complete")) {
        status.textContent = `正在点亮 ${next}，已用 ${formatSeconds(Date.now() - startedAt)} 秒`;
      }
    }

    function startSchulteTimer(section) {
      stopSchulteTimer();
      section.dataset.startedAt = String(Date.now());
      schulteTimer = setInterval(() => updateSchulteElapsed(section), 200);
    }

    function resetSchulteBoard(section) {
      stopSchulteTimer();
      section.classList.remove("schulte-complete");
      delete section.dataset.startedAt;
      const board = section.querySelector(".schulte-board");
      const meter = section.querySelector(".schulte-meter span");
      const status = section.querySelector(".schulte-status");
      if (board) {
        board.dataset.next = "1";
        board.innerHTML = renderSchulteCells(shuffleNumbers(25));
      }
      if (meter) meter.style.width = "0%";
      if (status) status.textContent = "新星图已生成，从 1 开始。";
    }

    function handleSchulteCell(button) {
      const section = button.closest(".schulte-section");
      const board = button.closest(".schulte-board");
      if (!section || !board || section.classList.contains("schulte-complete")) return;

      const target = Number(button.dataset.number);
      const next = Number(board.dataset.next || 1);
      const total = Number(board.dataset.total || 25);
      const status = section.querySelector(".schulte-status");
      const meter = section.querySelector(".schulte-meter span");

      if (target !== next) {
        button.classList.add("error");
        if (status) status.textContent = `先找 ${next}，不用急。`;
        setTimeout(() => button.classList.remove("error"), 280);
        return;
      }

      if (next === 1) startSchulteTimer(section);
      button.classList.add("found");
      button.disabled = true;

      const progress = Math.round((next / total) * 100);
      if (meter) meter.style.width = `${progress}%`;

      if (next >= total) {
        stopSchulteTimer();
        section.classList.add("schulte-complete");
        const startedAt = Number(section.dataset.startedAt || Date.now());
        if (status) status.textContent = `完成，星图点亮成功，用时 ${formatSeconds(Date.now() - startedAt)} 秒。`;
        return;
      }

      board.dataset.next = String(next + 1);
      if (status) status.textContent = `很好，继续找 ${next + 1}。`;
    }

    function collectDayProgress() {
      const questions = [...contentEl.querySelectorAll(".question")];
      const answered = questions.filter(card => card.classList.contains("answered")).length;
      const blanks = [...contentEl.querySelectorAll(".chinese-blank")];
      const filled = blanks.filter(input => input.value.trim()).length;
      const schulteSections = [...contentEl.querySelectorAll(".schulte-section")];
      const schulteDone = schulteSections.filter(section => section.classList.contains("schulte-complete")).length;
      return {
        answered,
        questionTotal: questions.length,
        filled,
        blankTotal: blanks.length,
        schulteDone,
        schulteTotal: schulteSections.length
      };
    }

    function buildSubmitSummary(progress) {
      const parts = [];
      if (progress.questionTotal) parts.push(`选择题 ${progress.answered}/${progress.questionTotal}`);
      if (progress.blankTotal) parts.push(`语文填空 ${progress.filled}/${progress.blankTotal}`);
      if (progress.schulteTotal) parts.push(`舒尔特方格 ${progress.schulteDone}/${progress.schulteTotal}`);
      return parts.length ? parts.join("，") : "已完成今日页面";
    }

    function submitDay(button) {
      const dayId = button.dataset.day;
      const day = DATA.days[dayId];
      if (!day) return;

      const progress = collectDayProgress();
      const summary = buildSubmitSummary(progress);
      dailySubmissions[dayId] = {
        submittedAt: new Date().toISOString(),
        summary
      };
      saveDailySubmissions();
      renderStats();

      const section = button.closest(".completion-section");
      const panel = section?.querySelector(".reflection-panel");
      const status = section?.querySelector(".completion-status");
      if (panel) {
        panel.innerHTML = renderReflectionContent(day, dailySubmissions[dayId]);
        panel.classList.remove("hidden");
      }
      if (status) status.textContent = "复盘已生成";
      button.textContent = "已提交，查看复盘";
    }

    tabsEl.addEventListener("click", event => {
      const button = event.target.closest("button[data-view]");
      if (!button) return;
      state.view = button.dataset.view;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    subjectFilterEl.addEventListener("click", event => {
      const button = event.target.closest("button[data-subject]");
      if (!button) return;
      state.subject = button.dataset.subject;
      subjectFilterEl.querySelectorAll("button").forEach(item => {
        item.setAttribute("aria-pressed", String(item === button));
      });
      render();
    });

    searchEl.addEventListener("input", event => {
      state.search = event.target.value;
      render();
    });

    contentEl.addEventListener("click", event => {
      const optionButton = event.target.closest(".option-btn");
      if (optionButton) {
        const card = optionButton.closest(".question");
        revealQuestion(card, Number(optionButton.dataset.index));
        return;
      }

      const hintButton = event.target.closest(".hint-btn");
      if (hintButton) {
        showHint(hintButton.closest(".question"));
        return;
      }

      const revealButton = event.target.closest(".reveal-btn");
      if (revealButton) {
        revealQuestion(revealButton.closest(".question"));
        return;
      }

      const resetButton = event.target.closest(".reset-btn");
      if (resetButton) {
        resetQuestion(resetButton.closest(".question"));
        return;
      }

      const schulteCell = event.target.closest(".schulte-cell");
      if (schulteCell) {
        handleSchulteCell(schulteCell);
        return;
      }

      const schulteResetButton = event.target.closest(".schulte-reset-btn");
      if (schulteResetButton) {
        resetSchulteBoard(schulteResetButton.closest(".schulte-section"));
        return;
      }

      const dailySubmitButton = event.target.closest(".daily-submit-btn");
      if (dailySubmitButton) {
        submitDay(dailySubmitButton);
        return;
      }

      const removeWrongButton = event.target.closest(".remove-wrong-btn");
      if (removeWrongButton) {
        removeWrong(removeWrongButton.dataset.key);
        return;
      }

      const clearWrongButton = event.target.closest(".clear-wrongbook-btn");
      if (clearWrongButton) {
        clearWrongBook();
      }
    });

    render();
  </script>
</body>
</html>
